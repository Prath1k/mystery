<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
        }

        /* Background Video Styles */
        #Loading-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100vw;
            min-height: 100vh;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            opacity: 0.5; /* Dim the video slightly so text is readable */
        }

        /* Overlay to ensure contrast */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 0;
        }

        /* Main Content Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: var(--primary-color);
            text-align: center;
        }

        /* Glassmorphism Card */
        .content-card {
            background: rgba(255, 255, 255, 0.01); /* More transparent background */
            backdrop-filter: blur(6px); /* Less blur to see watermark clearly */
            -webkit-backdrop-filter: blur(6px); /* Less blur for safari */
            border: 1px solid rgba(255, 255, 255, 0.05); /* Fainter border */
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5); /* Keep shadow for depth */
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        p {
            font-size: 1.2rem;
            color: #d4d4d8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Notification Form */
        .notify-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .notify-input {
            padding: 14px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
        }

        .notify-input::placeholder {
            color: #71717a;
        }

        .notify-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .notify-btn {
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            background: var(--primary-color);
            color: #000;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            white-space: nowrap;
            margin-top: 5px;
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.3);
            background: #f4f4f5;
        }

        .notify-btn:active {
            transform: translateY(0);
        }

        /* Loading Indicator */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 2rem auto;
        }

        /* Animations */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Watermark Styles */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 9.5rem; /* Slightly decreased from 12rem */
            font-weight: 700;
            color: rgba(255, 255, 255, 0.2); /* Increased opacity to 20% */
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.05em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            p {
                font-size: 1.05rem;
                margin-bottom: 2rem;
            }

            .content-card {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
            }
            
            .watermark {
                font-size: 6.5rem; /* Down from 8rem */
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            
            .watermark {
                font-size: 4rem; /* Down from 5rem */
            }
        }
    </style>
</head>
<body>
    
    <!-- Fixed background video with autoplay -->
    <!-- Added autoplay, changed to cover layout -->
    <video id="Loading-video" autoplay loop muted playsinline>
        <source src="Loading.mp4" type="video/mp4">
    </video>

    <!-- Overlay for depth and text contrast -->
    <div class="overlay"></div>

    <!-- Background Watermark -->
    <div class="watermark">Prathik Kontham</div>

    <div class="container">
        <div class="content-card">
            <div class="loader"></div>
            <h1>Something is Loading!</h1>
            <p>I am cooking something BIGGGG! Leave your details below to be the first to know when we launch.</p>
            
            <!-- Real Formspree functionality with customized CSS styling -->
            <form class="notify-form" action="https://formspree.io/f/xzdjrgnq" method="POST">
                <input type="text" name="name" class="notify-input" placeholder="Your Name" required>
                <input type="email" name="email" class="notify-input" placeholder="Your Email address" required>
                <button type="submit" class="notify-btn">Notify Me</button>
            </form>
        </div>
    </div>
    
</body>
</html>
